<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Illuvutar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
    #viewport { position: relative; width: 100vw; height: 100vh; }
    #world-canvas, #effect-canvas { position: absolute; top: 0; left: 0; }
    #effect-canvas { pointer-events: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body>
  <div id="viewport">
    <canvas id="world-canvas"></canvas>
    <canvas id="effect-canvas"></canvas>
    <div id="ui-layer"></div>
  </div>

  <div id="thought-log-panel">
    <div id="thought-log-header">💭 Entity Thoughts</div>
    <div id="thought-log"></div>
  </div>

  <style>
  #thought-log-panel {
    position: fixed;
    bottom: 0; left: 0;
    width: 360px;
    max-height: 200px;
    background: rgba(0,0,0,0.75);
    color: #e0e0e0;
    font-family: monospace;
    font-size: 12px;
    overflow: hidden;
    border-top-right-radius: 8px;
    z-index: 100;
  }
  #thought-log-header {
    padding: 4px 8px;
    background: rgba(80,40,120,0.9);
    font-weight: bold;
    font-size: 11px;
  }
  #thought-log {
    padding: 4px 8px;
    overflow-y: auto;
    max-height: 160px;
  }
  .thought-entry {
    margin: 2px 0;
    line-height: 1.3;
  }
  .thought-who {
    color: #b0a0ff;
    font-weight: bold;
  }
  </style>

  <script type="module" src="/js/renderer.js"></script>
</body>
</html>
