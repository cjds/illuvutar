<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Illuvutar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
    #viewport { position: relative; width: 100vw; height: 100vh; }
    #world-canvas, #effect-canvas { position: absolute; top: 0; left: 0; }
    #effect-canvas { pointer-events: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  </style>
</head>
<body>
  <div id="viewport">
    <canvas id="world-canvas"></canvas>
    <canvas id="effect-canvas"></canvas>
    <div id="ui-layer"></div>
  </div>
  <script type="module" src="/js/renderer.js"></script>
</body>
</html>
