<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Illuvutar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0f; color: #e0e0e0; font-family: monospace; overflow: hidden; }

    /* ── Status bar ── */
    #status-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 28px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px;
      background: rgba(10,10,15,0.88);
      border-bottom: 1px solid #222;
      font-size: 11px; letter-spacing: 0.03em;
    }
    #world-name { color: #a78bfa; font-weight: bold; font-size: 12px; }
    #tick-display { color: #64748b; }
    #conn-status { font-size: 10px; }
    #conn-status.ok  { color: #4ade80; }
    #conn-status.err { color: #f87171; }

    /* ── World viewport ── */
    #viewport {
      position: fixed; top: 28px; left: 0; right: 0; bottom: 0;
    }
    #world-canvas, #effect-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #effect-canvas { pointer-events: none; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    /* ── Live thought panel ── */
    #thought-panel {
      position: fixed; bottom: 0; left: 0;
      width: 380px;
      background: rgba(8,8,14,0.88);
      border-top: 1px solid #2a1f4e;
      border-right: 1px solid #2a1f4e;
      border-top-right-radius: 8px;
      z-index: 150;
      transition: height 0.15s ease;
    }
    #thought-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 10px;
      background: rgba(80, 40, 140, 0.5);
      border-top-right-radius: 8px;
      cursor: default;
      user-select: none;
    }
    #thought-panel-header span { font-size: 11px; font-weight: bold; color: #c4b5fd; }
    .panel-actions { display: flex; gap: 6px; }
    .panel-btn {
      background: transparent; border: 1px solid #4c1d95;
      color: #a78bfa; font-size: 10px; padding: 1px 7px;
      border-radius: 4px; cursor: pointer;
      font-family: monospace;
    }
    .panel-btn:hover { background: #4c1d95; color: #e9d5ff; }

    #thought-feed {
      padding: 5px 8px;
      max-height: 160px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin; scrollbar-color: #3b0764 transparent;
    }
    #thought-feed::-webkit-scrollbar { width: 4px; }
    #thought-feed::-webkit-scrollbar-thumb { background: #3b0764; border-radius: 2px; }

    .thought-entry {
      display: flex; gap: 5px; align-items: baseline;
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 11px; line-height: 1.4;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    .thought-tick { color: #475569; font-size: 9px; min-width: 32px; flex-shrink: 0; }
    .thought-who  { font-weight: bold; flex-shrink: 0; }
    .thought-msg  { color: #cbd5e1; }

    /* ── History modal ── */
    #history-modal {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
    }
    #history-modal.hidden { display: none; }

    #history-panel {
      width: min(700px, 92vw);
      height: min(520px, 85vh);
      background: #0f0f1a;
      border: 1px solid #2a1f4e;
      border-radius: 10px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: rgba(80, 40, 140, 0.4);
      border-bottom: 1px solid #2a1f4e;
    }
    #history-header span { font-size: 13px; font-weight: bold; color: #c4b5fd; }
    #history-close {
      background: transparent; border: none;
      color: #9ca3af; font-size: 16px; cursor: pointer; line-height: 1;
    }
    #history-close:hover { color: #f87171; }

    #history-filters {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 8px 12px;
      border-bottom: 1px solid #1e1e2e;
      background: rgba(0,0,0,0.2);
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af; font-size: 10px; padding: 2px 10px;
      border-radius: 12px; cursor: pointer; font-family: monospace;
      transition: all 0.15s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.07); }
    .filter-btn.active { background: rgba(124,58,237,0.25); border-color: #7c3aed; color: #c4b5fd; }

    #history-search {
      background: transparent; border: 1px solid #374151;
      color: #e0e0e0; font-size: 11px; padding: 2px 10px;
      border-radius: 12px; font-family: monospace;
      outline: none; min-width: 140px;
    }
    #history-search::placeholder { color: #4b5563; }
    #history-search:focus { border-color: #7c3aed; }

    #history-list {
      flex: 1; overflow-y: auto; padding: 4px 0;
      scrollbar-width: thin; scrollbar-color: #3b0764 transparent;
    }
    #history-list::-webkit-scrollbar { width: 5px; }
    #history-list::-webkit-scrollbar-thumb { background: #3b0764; border-radius: 2px; }

    .history-entry {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 6px;
      padding: 5px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px; line-height: 1.4;
    }
    .history-entry:hover { background: rgba(255,255,255,0.03); }
    .h-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .h-tick { color: #4b5563; font-size: 9px; }
    .h-who  { font-size: 10px; font-weight: bold; }
    .h-body { color: #cbd5e1; }
    .h-body .h-name { font-weight: bold; margin-right: 4px; }

    .history-empty {
      text-align: center; color: #4b5563;
      padding: 40px 20px; font-size: 12px; line-height: 1.7;
    }

    #history-count {
      padding: 4px 16px; font-size: 10px; color: #4b5563;
      border-top: 1px solid #1e1e2e; text-align: right;
    }

    /* ── Keyboard hints ── */
    #key-hints {
      position: fixed; bottom: 6px; right: 10px;
      font-size: 9px; color: #374151; z-index: 110;
      line-height: 1.7;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="world-name">✦ Illuvutar</span>
    <span id="tick-display">Tick —</span>
    <span id="conn-status" class="ok">● Connected</span>
  </div>

  <!-- World viewport -->
  <div id="viewport">
    <canvas id="world-canvas"></canvas>
    <canvas id="effect-canvas"></canvas>
    <div id="ui-layer"></div>
  </div>

  <!-- Live thought panel (bottom-left) -->
  <div id="thought-panel">
    <div id="thought-panel-header">
      <span>💭 Entity Thoughts</span>
      <div class="panel-actions">
        <button class="panel-btn" id="history-btn">📜 History</button>
        <button class="panel-btn" id="collapse-btn">▼</button>
      </div>
    </div>
    <div id="thought-feed"></div>
  </div>

  <!-- History modal (H to open) -->
  <div id="history-modal" class="hidden">
    <div id="history-panel">
      <div id="history-header">
        <span>📜 Entity Thought History</span>
        <button id="history-close" title="Close (Esc)">✕</button>
      </div>
      <div id="history-filters">
        <!-- entity filter buttons injected by JS -->
        <input id="history-search" type="text" placeholder="Search thoughts…" autocomplete="off">
      </div>
      <div id="history-list"></div>
      <div id="history-count"></div>
    </div>
  </div>

  <!-- Keyboard hints -->
  <div id="key-hints">
    H — thought history &nbsp;·&nbsp; ↑↓←→ — move player
  </div>

  <script type="module" src="/js/renderer.js"></script>
</body>
</html>
